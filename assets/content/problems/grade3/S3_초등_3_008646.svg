  <text id="slot.stem.text" x="55" y="35" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">원 모양의 종이를 접어 원의 성질을 알아보고 알맞은 말을 선택하세요.</text>
  <text id="slot.speech.text.text" x="540" y="105" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="22" text-anchor="middle" data-raw-text="원 모양의 종이를 둘로 똑같이 나누어지도록
접었다가 펼친 다음 다른 방향으로 둘로 똑같이
나누어지도록 접었다가 펼쳤어.">
    <tspan x="540" dy="0">원 모양의 종이를 둘로 똑같이 나누어지도록</tspan>
    <tspan x="540" dy="1.2em">접었다가 펼친 다음 다른 방향으로 둘로 똑같이</tspan>
    <tspan x="540" dy="1.2em">나누어지도록 접었다가 펼쳤어.</tspan>
  </text>
