  <text id="slot.q.title.text" x="14" y="30" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">도형에 대한 설명으로 틀린 것은 어느 것일까요?</text>
  <text id="slot.fig.lb.g.text" x="295" y="82" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="25">ㄱ</text>
  <text id="slot.fig.lb.n.text" x="225" y="227" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="25">ㄴ</text>
  <text id="slot.fig.lb.l.text" x="410" y="132" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="25">ㄹ</text>
  <text id="slot.fig.lb.d.text" x="390" y="257" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="25">ㄷ</text>
  <text id="slot.fig.lb.o.text" x="320" y="157" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">ㅇ</text>
  <text id="slot.inserted.text_box.1.text" x="35" y="320" fill="#111827" font-family="Noto Sans KR, sans-serif" font-size="25">    1. 원의 중심은    점 ㅇ입니다.  </text>
  <text id="slot.inserted.text_box.1.copy1.text" x="345" y="320" fill="#111827" font-family="Noto Sans KR, sans-serif" font-size="25">2. 원의 지름은 선분 ㄴㄹ입니다.</text>
  <text id="slot.inserted.text_box.1.copy1.copy2.text" x="35" y="365" fill="#111827" font-family="Noto Sans KR, sans-serif" font-size="25">3. 선분ㄴㅇ은 원의 반지름입니다.</text>
  <text id="slot.inserted.text_box.1.copy1.copy2.copy3.text" x="35" y="407" fill="#111827" font-family="Noto Sans KR, sans-serif" font-size="25">4. 길이가 가장 긴 선분은 선분 ㄱㄹ입니다. </text>
  <text id="slot.inserted.text_box.1.copy1.copy2.copy3.copy4.text" x="35" y="445" fill="#111827" font-family="Noto Sans KR, sans-serif" font-size="25">5. 선분 ㄷㅇ과 선분ㄹㅇ의 길이는 같습니다.</text>
