  <text id="slot.question.text" x="44.77" y="67.987" fill="#202124" font-family="Noto Sans KR" font-size="24" max_width="804" data-slot-kind="text_box" data-box-x="44.77" data-box-y="43.987" data-box-width="804" data-box-height="116" data-line-height="1.5" text-anchor="start" data-raw-text="상훈이는 1000원짜리 우표 1장을 사고, 100원짜리와 50원짜리 두 종류의 우표를 합해서 20장을 샀습니다. 우표값으로 2550원을 냈다면 상훈이는 100원짜리와 50원짜리 우표를 각각 몇 장 샀습니까?">
    <tspan x="44.77" y="67.987">상훈이는 1000원짜리 우표 1장을 사고, 100원짜리와 50원짜리 두 종류의</tspan>
