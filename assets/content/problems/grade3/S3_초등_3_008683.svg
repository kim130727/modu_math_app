  <text id="slot.bubble1.text" x="230" y="375" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="30">        줄로 연결한 막대를 돌려</text>
  <text id="slot.choice1.text" x="120" y="717" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="30">자를 이용하여 점을 더 ( 많이 , 적게 ) 찍은 다음, 점들을 이</text>
  <text id="slot.choice2.text" x="115" y="762" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="30">으면 원을 좀 더 정확하게 그릴 수 있습니다.</text>
  <text id="slot.bubble1.copy3.text" x="130" y="430" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="30">그린 원과 비슷한 원이 그려지는구나.  </text>
