  <text id="slot.q1.text" x="75" y="120" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="30">    다음과 같은 방법으로 원을 그렸습니다. 그린 원을 보고 </text>
  <text id="slot.q2.text" x="75" y="165" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="30">알맞은 말을 선택하세요.</text>
  <text id="slot.box2.text" x="115" y="240" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="30">① 빨간색 점에서 2 cm 떨어진 위치에 점을 찍습니다.</text>
  <text id="slot.box2_2.text" x="115" y="286" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="30">② 찍은 점들을 이어 원을 그립니다.</text>
  <text id="slot.diagram1.label1.text" x="730" y="380" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="30">2 cm</text>
