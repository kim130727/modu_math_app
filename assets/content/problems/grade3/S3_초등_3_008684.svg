  <text id="slot.stem.text" x="10" y="45" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="30">누름 못과 띠 종이를 이용하여 원을 그렸습니다. 그림을 보고 알맞은 말을 선택하세요.    </text>
  <text id="slot.left.text.text" x="45" y="420" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="30">① 한쪽 구멍에 누름 못을 꽂아 띠 종이를 고정해요.</text>
  <text id="slot.right.text.text" x="45" y="470" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="30">② 다른 구멍에 연필을 꽂고 한 바퀴 돌려    원을 그려요.  </text>
  <text id="slot.choice.text.text" x="40.002" y="534.014" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="30">누름 못이 꽂힌 점에서 원 위에 찍은 4개의 점까지의 길이는 모두 (같습니다, 다릅니다).</text>
