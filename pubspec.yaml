name: modu_math_app
description: A local Flutter MVP for solving Modu Math SVG/JSON problems.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_svg: ^2.0.10+1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/content/problems/
    - assets/content/problems/grade3/semester2/unit01_multiplication/
    - assets/content/problems/grade3/semester2/unit02_division/
    - assets/content/problems/grade3/semester2/unit03_circle/
    - assets/content/problems/manifest.json
